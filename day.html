<div class="card">
    <h2>Day Counter</h2>
    
    <p>Select Current Day:</p>
    <select id="startDay" onchange="clearResult()">
        <option value="Sunday">Sunday</option>
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
        <option value="Saturday">Saturday</option>
    </select>

    <p>How many days to add?</p>
    <input type="number" id="daysCount" value="20" oninput="clearResult()">
    
    <button onclick="calculateDay()">Calculate Result</button>

    <div id="result"></div>

    <div class="footer">💡 Tap (⋮) to explore other tools</div>
</div>

<script>
    function clearResult() {
        document.getElementById("result").innerText = "";
    }

    function calculateDay() {
        const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const startDaySelect = document.getElementById("startDay");
        const daysCountInput = document.getElementById("daysCount");
        const resultDiv = document.getElementById("result");

        const currentDayName = startDaySelect.value;
        const daysValue = daysCountInput.value;

        if (daysValue === "") {
            resultDiv.innerText = "Enter a number!";
            return;
        }

        const daysToAdd = parseInt(daysValue);
        const currentIndex = daysOfWeek.indexOf(currentDayName);
        
        let futureIndex = (currentIndex + daysToAdd) % 7;
        if (futureIndex < 0) futureIndex += 7;

        const finalDay = daysOfWeek[futureIndex];
        resultDiv.innerText = "It will be: " + finalDay;
    }    
</script>
