<!-- মেইন কার্ডের ঠিক নিচে সোজা সেন্টারে ফুটার বসালাম ভাই -->

<script>
    let mode = '';

    function openTool(m) {
        mode = m;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('input-section').style.display = 'block';
        const fields = document.getElementById('fields');
        const title = document.getElementById('tool-title');
        
        fields.innerHTML = '';
        document.getElementById('result-display').innerText = '';
        document.getElementById('calc-button').classList.remove('ready');

        let p1 = "", p2 = "";
        if (mode === 'V') { title.innerText = "Finding Voltage"; p1 = "Enter Watt (P)"; p2 = "Enter Ampere (I)"; }
        else if (mode === 'W') { title.innerText = "Finding Watt"; p1 = "Enter Voltage (V)"; p2 = "Enter Ampere (I)"; }
        else if (mode === 'A') { title.innerText = "Finding Ampere"; p1 = "Enter Watt (P)"; p2 = "Enter Voltage (V)"; }

        fields.innerHTML = `<input type="number" id="in1" placeholder="${p1}" oninput="validateInput()">
                            <input type="number" id="in2" placeholder="${p2}" oninput="validateInput()">`;
    }

    function validateInput() {
        const v1 = document.getElementById('in1').value;
        const v2 = document.getElementById('in2').value;
        const btn = document.getElementById('calc-button');
        
        document.getElementById('result-display').innerText = '';

        if (v1 !== '' && v2 !== '') {
            btn.classList.add('ready');
        } else {
            btn.classList.remove('ready');
        }
    }

    function startCalculation() {
        const val1 = parseFloat(document.getElementById('in1').value);
        const val2 = parseFloat(document.getElementById('in2').value);
        const btn = document.getElementById('calc-button');
        if (!btn.classList.contains('ready')) return;
        let res = 0, unit = "";
        if (mode === 'V') { res = val1 / val2; unit = " V"; }
        else if (mode === 'W') { res = val1 * val2; unit = " W"; }
        else if (mode === 'A') { res = val1 / val2; unit = " A"; }
        if (!isNaN(res)) {
            document.getElementById('result-display').innerText = res.toFixed(2) + unit;
        }
    }

    function clearFields() {
        const in1 = document.getElementById('in1');
        const in2 = document.getElementById('in2');
        if(in1) in1.value = '';
        if(in2) in2.value = '';
        document.getElementById('result-display').innerText = '';
        document.getElementById('calc-button').classList.remove('ready');
    }

    function goBack() {
        document.getElementById('main-menu').style.display = 'block';
        document.getElementById('input-section').style.display = 'none';
    }
</script>
