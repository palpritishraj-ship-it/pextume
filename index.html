<div class="top-header">
        <img src="logo.png" alt="Logo" class="brand-logo">

    <div class="container">
        <h2>GST Calculator</h2>
        
        <div class="input-group">
            <label>Amount (₹)</label>
            <input type="text" id="amt" inputmode="numeric" placeholder="e.g. 10,000" oninput="handleInput(this)">
        </div>

        <div class="input-group">
            <label>GST Rate (%)</label>
            <input type="number" id="gstRate" placeholder="e.g. 18" oninput="hideResult()">
        </div>

        <div class="btn-group">
            <button onclick="calculate(true)">Add GST</button>
            <button onclick="calculate(false)">Remove GST</button>
        </div>

        <div class="result-box" id="res">
            <p class="title" id="res_title">Total Value</p>
            <h3 id="total_val">₹0</h3>
            
            <div class="details">
                <p>Base Price: <span id="base_val">₹0</span></p>
                <p>Tax Amount: <span id="gst_val">₹0</span></p>
                <p>Final Net: <span id="net_val">₹0</span></p>
            </div>
        </div>

        <div class="footer">
            💡 Tap (⋮) to explore other tools
        </div>
    </div>

    <script>
        function hideResult() {
            document.getElementById('res').style.display = 'none';
        }

        function handleInput(input) {
            hideResult();
            let value = input.value.replace(/[^0-9]/g, ''); 
            if(value !== '') {
                input.value = Number(value).toLocaleString('en-IN');
            } else {
                input.value = '';
            }
        }

        function calculate(isAdd) {
            let amtRaw = document.getElementById('amt').value.replace(/,/g, '');
            let amount = parseFloat(amtRaw);
            let rate = parseFloat(document.getElementById('gstRate').value);

            if (amount > 0 && !isNaN(rate)) {
                let gst, total;
                
                if(isAdd) {
                    gst = (amount * rate) / 100;
                    total = amount + gst;
                    document.getElementById('res_title').innerText = "Total (Incl. GST)";
                } else {
                    total = amount / (1 + (rate / 100));
                    gst = amount - total;
                    document.getElementById('res_title').innerText = "Price (Excl. GST)";
                }

                document.getElementById('res').style.display = 'block';
                document.getElementById('total_val').innerText = "₹" + Math.round(total).toLocaleString('en-IN');
                document.getElementById('base_val').innerText = "₹" + amount.toLocaleString('en-IN');
                document.getElementById('gst_val').innerText = "₹" + Math.round(gst).toLocaleString('en-IN');
                document.getElementById('net_val').innerText = "₹" + Math.round(total).toLocaleString('en-IN');
            } else {
                alert("Please enter valid details");
            }
        }
    </script>
