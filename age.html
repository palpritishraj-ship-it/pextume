    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 25px;
            text-align: center;
            width: 100%;
            max-width: 420px;
            border: 2px solid rgba(0, 242, 255, 0.3);

            overflow: hidden; 
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            color: #00f2ff;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.6);
        }

        p.subtitle {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .input-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .input-group {
            flex: 1;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #00f2ff;
            margin-bottom: 8px;
            font-weight: 600;
        }

        select, input, button {
            outline: none !important;
        }

        select, input {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(0, 242, 255, 0.3);
            border-radius: 12px;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        select:focus, input:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.6);
            background: rgba(0, 0, 0, 0.4);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #00f2ff, #0072ff);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.4);
        }
        
        button:hover, .btn-active {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 114, 255, 0.7);
            background: linear-gradient(45deg, #0072ff, #00f2ff);
        }

        button:active {
            transform: scale(0.96);
        }

        #result-box {
            display: none;
            margin-top: 25px;
            animation: fadeIn 0.8s ease-out;
            position: relative; 
        }

        .highlight {
            color: #00f2ff;
            font-weight: bold;
            font-size: 26px;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .extra-info {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 15px;
            color: #ddd;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .countdown-box {
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }
        .countdown-text {
            color: #ffd700;
            font-weight: 600;
            font-size: 16px;
        }

        .total-stat {
            display: block;
            margin: 8px 0;
            color: #ffd700;
            font-weight: 600;
        }

        #cake-container {
            display: none;
            justify-content: center;
            align-items: flex-end;
            margin: 40px 0 20px 0;
            height: 140px;
            gap: 20px;
            position: relative;
        }

        .balloon {
            width: 40px;
            height: 50px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            position: relative;
            animation: floatBalloon 2s infinite alternate ease-in-out;
            will-change: transform;
        }
        .balloon-left { background: #ff4757; animation-delay: 0s; }
        .balloon-right { background: #ffd32a; animation-delay: 0.5s; }

        .balloon::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-bottom: 10px solid inherit;
        }
        .balloon-left::after { border-bottom-color: #ff4757; }
        .balloon-right::after { border-bottom-color: #ffd32a; }

        .string {
            width: 1px;
            height: 40px;
            background: rgba(255, 255, 255, 0.4);
            position: absolute;
            bottom: -40px;
            left: 50%;
        }

        .new-cake {
            position: relative;
            width: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: subtleBounce 1.5s infinite alternate ease-in-out;
        }

        .tier {
            position: relative;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            border-radius: 10px 10px 5px 5px;
            box-shadow: 0 4px 0 #c66b72;
            width: 100%;
        }
        
        .tier::before {
            content: '';
            position: absolute;
            top: -5px; left: 0; width: 100%; height: 10px;
            background: #fff;
            border-radius: 10px;
            background-image: radial-gradient(circle at 10px 8px, #fff 6px, transparent 7px);
            background-size: 20px 20px;
            background-position: -10px 0;
        }

        .tier-bottom { height: 40px; width: 100px; z-index: 1; background: linear-gradient(to right, #a18cd1, #fbc2eb); box-shadow: 0 4px 0 #846aafff;}
        .tier-middle { height: 30px; width: 80px; z-index: 2; background: linear-gradient(to right, #89f7fe, #66a6ff); box-shadow: 0 4px 0 #4987e4;}
        .tier-top    { height: 25px; width: 60px; z-index: 3; }

        .candles-container {
            position: absolute;
            top: -25px;
            display: flex;
            gap: 8px;
            z-index: 4;
        }

        .new-candle {
            width: 6px; height: 20px;
            background: repeating-linear-gradient(45deg, #fff, #fff 4px, #ff5722 4px, #ff5722 8px);
            border-radius: 3px;
            position: relative;
        }
        .main-candle { height: 25px; top: -5px; }

        .new-flame {
            position: absolute;
            top: -12px; left: 50%;
            transform: translateX(-50%);
            width: 10px; height: 14px;
            background: radial-gradient(ellipse at center, #ffd700 20%, #ff4500 100%);
            border-radius: 50% 50% 35% 35%;
            animation: flickerBetter 0.15s infinite alternate;
            box-shadow: 0 -2px 10px #ffd700;
        }

        @keyframes floatBalloon {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }

        @keyframes flickerBetter {
            0% { transform: translateX(-50%) scaleY(1); opacity: 0.9; }
            100% { transform: translateX(-50%) scaleY(1.1); opacity: 1; }
        }
        @keyframes subtleBounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        .calendar-wrap {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }
        .cal-head {
            font-family: 'Orbitron', sans-serif;
            color: #00f2ff;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 12px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.6);
        }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            font-size: 12px;
        }
        .cal-label { color: #ffd700; font-weight: bold; padding-bottom: 5px; }
        .cal-date { padding: 8px 0; border-radius: 8px; color: #ccc; }
        .is-birthday { background: #00f2ff; color: #000; font-weight: bold; box-shadow: 0 0 10px #00f2ff; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #888;
        }
   
.top-header {
    position: fixed;  
    top: 15px;
    left: 8px;
    z-index: 9999;
}

.brand-logo {

<body>
  <div class="top-header">
        <img src="logo.png" alt="Logo" class="brand-logo">
    </div>

    <div class="container">
        <h1>Age Calculator</h1>
        <p class="subtitle">Select your birth details accurately</p>
        
        <div class="input-box">
            <div class="row">
                <div class="input-group" style="flex: 1.2;">
                    <label>Month</label>
                    <select id="month" onchange="updateDays()">
                        <option value="1">January</option>
                        <option value="2">February</option>
                        <option value="3">March</option>
                        <option value="4">April</option>
                        <option value="5">May</option>
                        <option value="6">June</option>
                        <option value="7">July</option>
                        <option value="8">August</option>
                        <option value="9">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Date</label>
                    <select id="day" onchange="updateDays()"></select>
                </div>
            </div>
            <div class="row">
                <div class="input-group">
                    <label>Year</label>
                    <input type="number" id="year" placeholder="YYYY" 
                        onkeydown="if(['.', 'e', 'E', '+', '-'].includes(event.key)) event.preventDefault();"
                        oninput="this.value = this.value.replace(/[^0-9]/g, ''); if(this.value.length > 5) this.value = this.value.slice(0, 5); updateDays();">
                </div>
            </div>
        </div>

        <button id="calcBtn" onclick="calculateAge()">Calculate Age</button>

        <div id="result-box">
            <div id="cake-container">
                <div class="balloon balloon-left"><div class="string"></div></div>
                <div class="new-cake">
                    <div class="candles-container">
                        <div class="new-candle"><div class="new-flame"></div></div>
                        <div class="new-candle main-candle"><div class="new-flame"></div></div>
                        <div class="new-candle"><div class="new-flame"></div></div>
                    </div>
                    <div class="tier tier-top"></div>
                    <div class="tier tier-middle"></div>
                    <div class="tier tier-bottom"></div>
                </div>
                <div class="balloon balloon-right"><div class="string"></div></div>
            </div>

            <div id="ageOutput"></div>
            <div class="extra-info">
                <span class="total-stat" id="totalMonths"></span>
                <span class="total-stat" id="totalDays"></span>
                
                <div class="countdown-box">
                    <div id="nextBirthday" class="countdown-text"></div>
                </div>
            </div>

            <div class="calendar-wrap">
                <div class="cal-head" id="calTitle">Birth Month</div>
                <div class="cal-grid" id="calGrid"></div>
            </div>
        </div>

        <div class="footer">💡 Tap (⋮) to explore other tools</div></div>
    </div>

    <script>
        const daySelect = document.getElementById('day');
        const monthSelect = document.getElementById('month');
        const yearInput = document.getElementById('year');
        const calcBtn = document.getElementById('calcBtn');
        const cakeContainer = document.getElementById('cake-container');

        function updateDays() {
            document.getElementById('result-box').style.display = "none";
            cakeContainer.style.display = "none";
            calcBtn.classList.remove('btn-active');

            const month = parseInt(monthSelect.value);
            const year = parseInt(yearInput.value) || new Date().getFullYear();
            const daysInMonth = new Date(year, month, 0).getDate();
            
            const currentDay = daySelect.value;
            
            daySelect.innerHTML = '';
            for (let i = 1; i <= daysInMonth; i++) {
                let op = document.createElement('option');
                op.value = i;
                op.text = i;
                daySelect.appendChild(op);
            }

            if (currentDay && currentDay <= daysInMonth) {
                daySelect.value = currentDay;
            } else if (currentDay > daysInMonth) {
                daySelect.value = daysInMonth;
            }
        }

        updateDays();

        function calculateAge() {
          
            let d1 = parseInt(daySelect.value);
            let m1 = parseInt(monthSelect.value);
            let y1 = parseInt(yearInput.value);
            let res = document.getElementById('result-box');

            if (!y1) {
                alert("Please enter a valid year.");
                return;
            }

            let birth = new Date(y1, m1 - 1, d1);
            let today = new Date();
            today.setHours(0,0,0,0); 

            if (birth > today) {
                alert("Birth date cannot be in the future!");
                res.style.display = "none";
                return;
            }

            calcBtn.classList.add('btn-active');

            let yrs = today.getFullYear() - birth.getFullYear();
            let mos = today.getMonth() - birth.getMonth();
            let day = today.getDate() - birth.getDate();

            if (day < 0) { 
                mos--; 
                day += new Date(today.getFullYear(), today.getMonth(), 0).getDate(); 
            }
            if (mos < 0) { 
                yrs--; 
                mos += 12; 
            }

            res.style.display = "block";
            
            document.getElementById('ageOutput').innerHTML = `You are <br><span class="highlight">${yrs}</span> Year${yrs!==1?'s':''}, <span class="highlight">${mos}</span> Month${mos!==1?'s':''}, <span class="highlight">${day}</span> Day${day!==1?'s':''} old!`;
            
            document.getElementById('totalMonths').innerHTML = `🔹 Total Months: <b>${(yrs * 12) + mos}</b>`;
            document.getElementById('totalDays').innerHTML = `🔹 Total Days: <b>${Math.floor((new Date() - birth) / 86400000).toLocaleString()}</b>`;

            calculateNextBirthday(m1, d1);
            drawCalendar(y1, m1, d1);
        }

        function calculateNextBirthday(m1, d1) {
            let today = new Date();
            today.setHours(0, 0, 0, 0);

            let nextBday = new Date(today.getFullYear(), m1 - 1, d1);
            
            if (today.getTime() > nextBday.getTime()) {
                nextBday.setFullYear(today.getFullYear() + 1);
            }

            let diff = nextBday.getTime() - today.getTime();
            let daysLeft = Math.round(diff / (1000 * 60 * 60 * 24));
            
            let output = "";
            cakeContainer.style.display = "none";

            if (daysLeft === 0) {
                output = "🎉 Happy Birthday! It's Today! 🎂";
                cakeContainer.style.display = "flex"; 
            } else if (daysLeft === 1) {
                output = "🎁 Happy Birthday Tomorrow! 🎂";
            } else if (daysLeft >= 364) {
                output = "🥳 Your Birthday was Yesterday! Hope it was great!";
            } else {
                let mRemaining = 0;
                let tempDate = new Date(today);
                while (true) {
                    let nextMonth = new Date(tempDate);
                    nextMonth.setMonth(nextMonth.getMonth() + 1);
                    if (nextMonth > nextBday) break;
                    tempDate = nextMonth;
                    mRemaining++;
                }
                let dRemaining = Math.round((nextBday - tempDate) / (1000 * 60 * 60 * 24));
                
                let mText = mRemaining > 0 ? `<b>${mRemaining}</b> Month${mRemaining > 1 ? 's' : ''}` : "";
                let dText = dRemaining > 0 ? `<b>${dRemaining}</b> Day${dRemaining > 1 ? 's' : ''}` : "";
                let connector = (mRemaining > 0 && dRemaining > 0) ? ", " : "";
                
                output = `🎁 Next Birthday in: ${mText}${connector}${dText}`;
            }

            document.getElementById('nextBirthday').innerHTML = output;
        }

function drawCalendar(y, m, d) {
            const grid = document.getElementById('calGrid');
            const title = document.getElementById('calTitle');
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const labels = ["S", "M", "T", "W", "T", "F", "S"];

            title.innerText = `${months[m-1]} ${y} Calendar`;
            grid.innerHTML = '';

            labels.forEach(l => {
                const div = document.createElement('div');
                div.className = 'cal-label';
                div.innerText = l;
                grid.appendChild(div);
            });

            const startDay = new Date(y, m-1, 1).getDay();
            const totalDays = new Date(y, m, 0).getDate();

            for (let i = 0; i < startDay; i++) grid.appendChild(document.createElement('div'));

            for (let i = 1; i <= totalDays; i++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'cal-date' + (i === d ? ' is-birthday' : '');
                dayDiv.innerText = i;
                grid.appendChild(dayDiv);
            }
        }
    </script>

</div>

<script>
    document.addEventListener('click', function(event) {
        var sideMenu = document.getElementById('sideMenu');
        var menuBtn = document.getElementById('menuBtn');
        
        // যদি ক্লিকটা মেনুর বাইরে এবং মেনু বাটনের বাইরে হয়

</script>
