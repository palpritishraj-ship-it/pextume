<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Calculator</title>
    <meta name="description" content="Calculate the exact duration between two dates in years, months, and days. Free, fast, and accurate Date Calculator tool by Pextume.">
    <meta name="keywords" content="date calculator, days between dates, duration calculator, date difference, time between dates,year to year calculator,pextume">
    <link rel="icon" type="image/png" href="favicon.png">
   <link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/app-icon.png"> 
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 25px;
            text-align: center;
            width: 100%;
            max-width: 420px;
            border: 2px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            position: relative;
            overflow: hidden; 
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: #00f2ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.6);
        }

        p.subtitle {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        .section-title {
            text-align: left;
            font-size: 12px;
            color: #ffd700;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .input-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 15px;
        }

        .row {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .input-group {
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            color: #00f2ff;
            margin-bottom: 6px;
            font-weight: 600;
        }

        select, input, button {
            outline: none !important;
        }

        select, input {
            width: 100%;
            padding: 12px 6px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(0, 242, 255, 0.3);
            border-radius: 12px;
            font-size: 15px;
            color: #fff;
            cursor: pointer;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input[type="number"] {
            text-align: center;
            padding: 12px 10px;
        }
        select:focus, input:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.6);
            background: rgba(0, 0, 0, 0.4);
            transform: scale(1.02);
        }

        /* বাটন স্টাইল */
        #calcBtn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #00f2ff, #0072ff);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.4);
        }
        
        #calcBtn:hover, .btn-active {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 114, 255, 0.7);
            background: linear-gradient(45deg, #0072ff, #00f2ff) !important;
        }

        #calcBtn:active {
            transform: scale(0.96);
        }

        #result-box {
            display: none;
            margin-top: 25px;
            animation: fadeIn 0.8s ease-out;
        }

        .highlight {
            color: #00f2ff;
            font-weight: bold;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .extra-info {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 15px;
            color: #ddd;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .total-stat {
            display: block;
            margin: 5px 0;
            color: #ffd700;
            font-weight: 600;
        }

        .calendar-wrap {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 15px;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }
        .cal-head {
            font-family: 'Orbitron', sans-serif;
            color: #00f2ff;
            font-size: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            font-size: 11px;
        }
        .cal-label { color: #ffd700; font-weight: bold; }
        .cal-date { padding: 6px 0; border-radius: 6px; color: #ccc; }
        .is-selected { background: #00f2ff; color: #000; font-weight: bold; box-shadow: 0 0 8px #00f2ff; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .top-header { position: fixed; top: 15px; left: 8px; z-index: 9999; }
        .brand-logo { width: 140px; height: auto; }
        .footer { margin-top: 30px; font-size: 12px; color: #888; }

        /* সাইডবার স্টাইল */
        #sideMenu {
            height:100%; width:270px; position:fixed; z-index:100000; top:0; right:0; 
            background: rgba(15, 23, 42, 0.98); transform: translateX(100%); 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border-top-left-radius: 35px; border-bottom-left-radius: 35px; 
            border-left: 1.5px solid #00f2ff; box-shadow: -10px 0 30px rgba(0,0,0,0.6); 
            will-change: transform; overflow-x:hidden;
        }
    </style>
</head>
<body>

    <div class="top-header">
        <img src="logo.png" alt="Logo" class="brand-logo">
    </div>

    <div class="container">
        <h1>Date calculator</h1>
        <p class="subtitle">Calculate duration between two custom dates</p>

        

        <div class="section-title">From (Start Date)</div>
       
        <div class="input-box">
            <div class="row">
                <div class="input-group" style="flex: 1.8;">
                    <label>Month</label>
                    <select id="m1" onchange="updateDays('m1','y1','d1'); handleValueChange();">
                        <option value="1">January</option><option value="2">February</option>
                        <option value="3">March</option><option value="4">April</option>
                        <option value="5">May</option><option value="6">June</option>
                        <option value="7">July</option><option value="8">August</option>
                        <option value="9">September</option><option value="10">October</option>
                        <option value="11">November</option><option value="12">December</option>
                    </select>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Date</label>
                    <select id="d1" onchange="handleValueChange();"></select>
                </div>
                <div class="input-group" style="flex: 1.4;">
                    <label>Year</label>
                    <input type="number" id="y1" placeholder="YYYY" oninput="updateDays('m1','y1','d1'); handleValueChange();">
                </div>
            </div>
        </div>

        <div class="section-title">To (End Date)</div>
        <div class="input-box">
            <div class="row">
                <div class="input-group" style="flex: 1.8;">
                    <label>Month</label>
                    <select id="m2" onchange="updateDays('m2','y2','d2'); handleValueChange();">
                        <option value="1">January</option><option value="2">February</option>
                        <option value="3">March</option><option value="4">April</option>
                        <option value="5">May</option><option value="6">June</option>
                        <option value="7">July</option><option value="8">August</option>
                        <option value="9">September</option><option value="10">October</option>
                        <option value="11">November</option><option value="12">December</option>
                    </select>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Date</label>
                    <select id="d2" onchange="handleValueChange();"></select>
                </div>
                <div class="input-group" style="flex: 1.4;">
                    <label>Year</label>
                    <input type="number" id="y2" placeholder="YYYY" oninput="updateDays('m2','y2','d2'); handleValueChange();">
                </div>
            </div>
        </div>

        <button id="calcBtn" onclick="calculateDifference()">Calculate Difference</button>

        <div id="result-box">
            <div id="output"></div>
            <div class="extra-info">
                <span class="total-stat" id="totalMonths"></span>
                <span class="total-stat" id="totalDays"></span>
            </div>

            <div class="calendar-wrap">
                <div class="cal-head" id="head1">Start Date</div>
                <div class="cal-grid" id="grid1"></div>
            </div>
            <div class="calendar-wrap" style="margin-top: 10px;">
                <div class="cal-head" id="head2">End Date</div>
                <div class="cal-grid" id="grid2"></div>
            </div>
        </div>

        <div class="footer">💡 Tap (⋮) to explore other tools</div>
    </div>

    <div id="menuBtnWrapper" style="position: fixed; top: 5px; right: 30px; z-index: 99999;">
        <div onclick="event.stopPropagation(); document.getElementById('sideMenu').style.transform='translateX(0)'" 
             style="cursor:pointer; font-size:35px; color:#00f2ff; text-shadow: 0 0 12px rgba(0, 242, 255, 0.7); padding: 5px;">⋮</div>
    </div>

    <div id="sideMenu">
        <a href="javascript:void(0)" onclick="document.getElementById('sideMenu').style.transform='translateX(100%)'" 
           style="position:absolute; top:20px; right:25px; font-size:40px; color:#ff4757; text-decoration:none;">&times;</a>
        <div style="padding-top: 80px; display: flex; flex-direction: column; white-space: nowrap;">
            <div style="padding: 0 30px 15px 0; text-align: right; color: #00f2ff; font-size: 14px; font-weight: bold; text-transform: uppercase;">Other Tools</div>
            <a href="age.html" style="padding:18px 30px; text-decoration:none; font-size:18px; color:#fff; font-family:sans-serif; border-bottom:1px solid rgba(255,255,255,0.05); text-align: right; letter-spacing: 1px; -webkit-tap-highlight-color:transparent;">Age calculator</a>
            <a href="electric.html" style="padding:18px 30px; color:#fff; text-decoration:none; border-bottom:1px solid rgba(255,255,255,0.05); text-align: right;">Electric Calculator</a>
            <a href="day.html" style="padding:18px 30px; color:#fff; text-decoration:none; border-bottom:1px solid rgba(255,255,255,0.05); text-align: right;">Day counter</a>
            <a href="index.html" style="padding:18px 30px; color:#fff; text-decoration:none; border-bottom:1px solid rgba(255,255,255,0.05); text-align: right;">GST Calculator</a>
            <a href="emi.html" style="padding:18px 30px; color:#fff; text-decoration:none; border-bottom:1px solid rgba(255,255,255,0.05); text-align: right;">EMI Calculator</a>
        </div>
    </div>

    <script>
        const mainBtn = document.getElementById('calcBtn');

        // ভ্যালু ট্র্যাক করার ট্র্যাকার ভেরিয়েবল
        let lastM1 = "", lastY1 = "", lastD1 = "";
        let lastM2 = "", lastY2 = "", lastD2 = "";
        let isCalculated = false;

        function updateDays(mId, yId, dId) {
            const m = parseInt(document.getElementById(mId).value);
            const y = parseInt(document.getElementById(yId).value) || new Date().getFullYear();
            const dSel = document.getElementById(dId);
            const daysInMonth = new Date(y, m, 0).getDate();
            const lastVal = dSel.value;

            dSel.innerHTML = '';
            for(let i=1; i<=daysInMonth; i++){
                let opt = document.createElement('option');
                opt.value = opt.text = i;
                dSel.appendChild(opt);
            }
            if(lastVal && lastVal <= daysInMonth) dSel.value = lastVal;
            else dSel.value = 1;
        }

        function handleValueChange() {
            if (!isCalculated) return; 

            const currentM1 = document.getElementById('m1').value;
            const currentY1 = document.getElementById('y1').value;
            const currentD1 = document.getElementById('d1').value;
            const currentM2 = document.getElementById('m2').value;
            const currentY2 = document.getElementById('y2').value;
            const currentD2 = document.getElementById('d2').value;

            // যদি একটি সিঙ্গেল সংখ্যাও টাইপ বা ডিলিট করা হয়, সাথে সাথে একশন নেবে
            if (lastM1 !== currentM1 || lastY1 !== currentY1 || lastD1 !== currentD1 ||
                lastM2 !== currentM2 || lastY2 !== currentY2 || lastD2 !== currentD2) {
                
                document.getElementById('result-box').style.display = 'none'; 
                mainBtn.classList.remove('btn-active'); 
                isCalculated = false; 
            }
        }

        // শুরুতে ডেট সেট আপ
        const today = new Date();
        document.getElementById('y2').value = today.getFullYear();
        document.getElementById('m2').value = today.getMonth() + 1;
        updateDays('m1','y1','d1');
        updateDays('m2','y2','d2');
        document.getElementById('d2').value = today.getDate();

        function calculateDifference() {
            const y1 = parseInt(document.getElementById('y1').value);
            const y2 = parseInt(document.getElementById('y2').value);

            if(!y1 || !y2) { 
                alert("Please enter valid years."); 
                return; 
            }

            const dt1 = new Date(y1, document.getElementById('m1').value - 1, document.getElementById('d1').value);
            const dt2 = new Date(y2, document.getElementById('m2').value - 1, document.getElementById('d2').value);

            if(dt1 > dt2) { 
                alert("Start date cannot be after end date!"); 
                return; 
            }

            mainBtn.classList.remove('btn-active');
            void mainBtn.offsetWidth; 
            mainBtn.classList.add('btn-active');

            let years = dt2.getFullYear() - dt1.getFullYear();
            let months = dt2.getMonth() - dt1.getMonth();
            let days = dt2.getDate() - dt1.getDate();

            if(days < 0) {
                months--;
                days += new Date(dt2.getFullYear(), dt2.getMonth(), 0).getDate();
            }
            if(months < 0) {
                years--;
                months += 12;
            }

            document.getElementById('result-box').style.display = 'block';
            document.getElementById('output').innerHTML = `Duration is <br><span class="highlight">${years}</span> Years, <span class="highlight">${months}</span> Months, <span class="highlight">${days}</span> Days`;
            document.getElementById('totalMonths').innerHTML = `🔹 Total Months: <b>${(years * 12) + months}</b>`;
            document.getElementById('totalDays').innerHTML = `🔹 Total Days: <b>${Math.floor((dt2 - dt1) / 86400000).toLocaleString()}</b>`;

            drawCalendar(y1, document.getElementById('m1').value, document.getElementById('d1').value, 'head1', 'grid1');
            drawCalendar(y2, document.getElementById('m2').value, document.getElementById('d2').value, 'head2', 'grid2');
            
            lastM1 = document.getElementById('m1').value; lastY1 = document.getElementById('y1').value; lastD1 = document.getElementById('d1').value;
            lastM2 = document.getElementById('m2').value; lastY2 = document.getElementById('y2').value; lastD2 = document.getElementById('d2').value;
            isCalculated = true; 
        }

        function drawCalendar(y, m, d, hId, gId) {
            const grid = document.getElementById(gId);
            const monthsName = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            document.getElementById(hId).innerText = monthsName[m-1] + " " + y + " CALENDAR";
            grid.innerHTML = '';
            ["S","M","T","W","T","F","S"].forEach(l => {
                let div = document.createElement('div'); div.className='cal-label'; div.innerText=l; grid.appendChild(div);
            });
            const firstDay = new Date(y, m-1, 1).getDay();
            const totalDays = new Date(y, m, 0).getDate();
            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
            for(let i=1; i<=totalDays; i++) {
                let div = document.createElement('div');
                div.className = 'cal-date' + (i == d ? ' is-selected' : '');
                div.innerText = i;
                grid.appendChild(div);
            }
        }

        document.addEventListener('click', function(event) {
            var sideMenu = document.getElementById('sideMenu');
            var menuBtn = document.getElementById('menuBtnWrapper');
            if (!sideMenu.contains(event.target) && !menuBtn.contains(event.target)) {
                sideMenu.style.transform = 'translateX(100%)';
            }
        });
    </script>
</body>
</html>
